<!DOCTYPE html>
<html>
<head>
    <title>My Social Links</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 300px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        .btn {
            display: block;
            margin: 12px 0;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .fb { background: #1877f2; }
        .ig { background: #e1306c; }
        .yt { background: #ff0000; }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 3px solid white;
        }
    </style>
</head>
<body>

    <div class="card">

        <img class="avatar" src="https://via.placeholder.com/80" alt="Profile">

        <h2>Follow Me 🚀</h2>
        <p>Stay connected on social media</p>

        <a class="btn fb" href="https://facebook.com/yourpage">Facebook</a>
        <a class="btn ig" href="https://instagram.com/yourpage">Instagram</a>
        <a class="btn yt" href="https://www.youtube.com/results?search_query=rushi+ghorpade">YouTube</a>

    </div>

</body>
</html>
